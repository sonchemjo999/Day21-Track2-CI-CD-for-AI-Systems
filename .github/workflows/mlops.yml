name: MLOps Pipeline

on:
  push:
    branches: [main]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:

  # JOB 1: Chay unit tests tren du lieu ao (khong can cloud credentials)
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: pytest tests/ -v

  # JOB 2: Huan luyen mo hinh tren du lieu thuc, upload artifact len cloud storage
  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Pull data with DVC
        run: dvc pull data/train_phase1.csv data/eval.csv

      - name: Train model
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACCURACY=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACCURACY" >> $GITHUB_OUTPUT

      - name: Upload model to S3
        run: |
          aws s3 cp models/model.pkl s3://${{ secrets.S3_BUCKET }}/models/latest/model.pkl
          echo "Model uploaded to s3://${{ secrets.S3_BUCKET }}/models/latest/model.pkl"

      - name: Save metrics as artifact
        uses: actions/upload-artifact@v4
        with:
          name: metrics
          path: outputs/metrics.json

  # JOB 3: Kiem tra chat luong - chi cho phep deploy khi accuracy >= 0.70
  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:

      - name: Check eval gate
        run: |
          python - <<'EOF'
          accuracy = float("${{ needs.train.outputs.accuracy }}")
          threshold = 0.70
          if accuracy < threshold:
              print(f"FAILED: accuracy {accuracy:.4f} < {threshold}")
              raise SystemExit(1)
          else:
              print(f"PASSED: accuracy {accuracy:.4f} >= {threshold}")
          EOF

  # JOB 4: Trien khai sau khi eval gate qua
  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to VM
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            if curl -f http://localhost:8000/health > /dev/null 2>&1; then
                echo "Health check passed"
            else
                echo "Health check failed"
                exit 1
            fi
